name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/hackatoan/cah
  HOST: root@192.168.1.210

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Deploy to homelab
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.210
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/hackatoan/cah:latest
            docker stop cah 2>/dev/null || true
            docker rm cah 2>/dev/null || true
            docker run -d \
              --name cah \
              --restart unless-stopped \
              -p 3029:3029 \
              -v cah-data:/data \
              ghcr.io/hackatoan/cah:latest
