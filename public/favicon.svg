<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Black card -->
  <rect x="5" y="5" width="14" height="19" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <!-- Text lines on black card -->
  <line x1="8" y1="10" x2="16" y2="10" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="13" x2="14" y2="13" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Blank underline -->
  <line x1="8" y1="16" x2="16" y2="16" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- White card (offset, overlapping) -->
  <rect x="13" y="8" width="14" height="19" rx="2" fill="#f5f0e8" stroke="#ddd" stroke-width="1"/>
  <!-- Text lines on white card -->
  <line x1="16" y1="13" x2="24" y2="13" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="16" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Green check -->
  <circle cx="23" cy="23" r="4" fill="#39ff14"/>
  <polyline points="21,23 22.5,24.5 25,21.5" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
