<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Black card (large) -->
  <rect x="80" y="80" width="320" height="440" rx="18" fill="#111" stroke="#333" stroke-width="2"/>
  <text x="120" y="160" font-family="Georgia,serif" font-size="28" fill="#fff" font-weight="bold">Cards Against</text>
  <text x="120" y="200" font-family="Georgia,serif" font-size="28" fill="#fff" font-weight="bold">Hackatoa</text>
  <line x1="120" y1="280" x2="360" y2="280" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <text x="120" y="320" font-family="Georgia,serif" font-size="22" fill="#777">is better than</text>
  <line x1="120" y1="360" x2="340" y2="360" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- White card (offset) -->
  <rect x="260" y="130" width="300" height="420" rx="18" fill="#f5f0e8" stroke="#ddd" stroke-width="2"/>
  <text x="300" y="220" font-family="Georgia,serif" font-size="24" fill="#111">Your answer</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="24" fill="#111">here.</text>

  <!-- Second white card -->
  <rect x="440" y="160" width="300" height="420" rx="18" fill="#eee8dc" stroke="#ccc" stroke-width="2"/>
  <text x="480" y="260" font-family="Georgia,serif" font-size="24" fill="#222">Everyone</text>
  <text x="480" y="300" font-family="Georgia,serif" font-size="24" fill="#222">votes.</text>

  <!-- Right side text -->
  <text x="820" y="220" font-family="Georgia,serif" font-size="62" fill="#fff" font-weight="bold">Cards Against</text>
  <text x="820" y="300" font-family="Georgia,serif" font-size="62" fill="#39ff14" font-weight="bold">Hackatoa</text>
  <text x="820" y="380" font-family="Georgia,serif" font-size="28" fill="#888">No czar. Everyone votes.</text>
  <text x="820" y="430" font-family="Georgia,serif" font-size="28" fill="#888">Custom cards. Free.</text>
  <text x="820" y="520" font-family="Georgia,serif" font-size="22" fill="#555">cah.hackatoa.com</text>
</svg>
